<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suporte — BabySuite DicomBridge</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-hover: #0b5f59;
      --border: #dbe3ea;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef6f5 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 2rem;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.05s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }

    .note {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .footer {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 700px) {
      .card { padding: 22px; }
      .grid { grid-template-columns: 1fr; gap: 0; }
      .field.full { grid-column: auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Suporte — BabySuite DicomBridge</h1>
      <p class="subtitle">
        Use o formulário abaixo para enviar dúvidas, relatar problemas técnicos ou solicitar suporte relacionado ao aplicativo BabySuite DicomBridge.
      </p>

      <form id="supportForm">
        <div class="grid">
          <div class="field">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required />
          </div>

          <div class="field">
            <label for="email">E-mail para resposta</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="field">
            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" name="assunto" required />
          </div>

          <div class="field">
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria">
              <option value="Dúvida geral">Dúvida geral</option>
              <option value="Problema técnico">Problema técnico</option>
              <option value="Instalação">Instalação</option>
              <option value="Conta e acesso">Conta e acesso</option>
              <option value="Sugestão">Sugestão</option>
            </select>
          </div>

          <div class="field full">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" required placeholder="Descreva aqui sua dúvida ou problema."></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="submit">Enviar solicitação</button>
          <span class="note">O envio abrirá o aplicativo de e-mail padrão do usuário com a mensagem preenchida.</span>
        </div>
      </form>

      <div class="footer">
        Contato direto: <strong>fdalto@gmail.com</strong>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('supportForm').addEventListener('submit', function (event) {
      event.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const assunto = document.getElementById('assunto').value.trim();
      const categoria = document.getElementById('categoria').value;
      const mensagem = document.getElementById('mensagem').value.trim();

      const subject = `[BabySuite DicomBridge] ${assunto}`;
      const body = [
        `Nome: ${nome}`,
        `E-mail: ${email}`,
        `Categoria: ${categoria}`,
        '',
        'Mensagem:',
        mensagem
      ].join('\n');

      const mailto = `mailto:fdalto@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
    });
  </script>
</body>
</html>
